# Draft a GitHub Release from a version tag and attach Hotate.dmg + auto-update metadata.
# Usage: git tag v0.1.0 && git push origin v0.1.0

name: Release menubar (macOS)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bundle Ollama CLI (official darwin tgz)
        run: node scripts/download-ollama-cli.mjs

      - name: Build & publish with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish always
